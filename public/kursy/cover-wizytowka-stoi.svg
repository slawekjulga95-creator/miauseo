<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#D45500"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g opacity="0.07" fill="white">
    <circle cx="75" cy="75" r="4"/><circle cx="225" cy="75" r="4"/><circle cx="375" cy="75" r="4"/><circle cx="525" cy="75" r="4"/><circle cx="675" cy="75" r="4"/><circle cx="825" cy="75" r="4"/><circle cx="975" cy="75" r="4"/><circle cx="1125" cy="75" r="4"/>
    <circle cx="75" cy="225" r="4"/><circle cx="225" cy="225" r="4"/><circle cx="375" cy="225" r="4"/><circle cx="525" cy="225" r="4"/><circle cx="675" cy="225" r="4"/><circle cx="825" cy="225" r="4"/><circle cx="975" cy="225" r="4"/><circle cx="1125" cy="225" r="4"/>
    <circle cx="75" cy="375" r="4"/><circle cx="225" cy="375" r="4"/><circle cx="375" cy="375" r="4"/><circle cx="525" cy="375" r="4"/><circle cx="675" cy="375" r="4"/><circle cx="825" cy="375" r="4"/><circle cx="975" cy="375" r="4"/><circle cx="1125" cy="375" r="4"/>
    <circle cx="75" cy="525" r="4"/><circle cx="225" cy="525" r="4"/><circle cx="375" cy="525" r="4"/><circle cx="525" cy="525" r="4"/><circle cx="675" cy="525" r="4"/><circle cx="825" cy="525" r="4"/><circle cx="975" cy="525" r="4"/><circle cx="1125" cy="525" r="4"/>
  </g>

  <!-- Chart area — flatline then stuck -->
  <g transform="translate(100, 120)">
    <!-- Chart bg card -->
    <rect x="0" y="0" width="520" height="320" rx="24" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

    <!-- Y-axis labels -->
    <text x="20" y="50" font-family="system-ui,sans-serif" font-size="11" fill="white" opacity="0.4">100</text>
    <text x="20" y="120" font-family="system-ui,sans-serif" font-size="11" fill="white" opacity="0.4">75</text>
    <text x="20" y="190" font-family="system-ui,sans-serif" font-size="11" fill="white" opacity="0.4">50</text>
    <text x="20" y="260" font-family="system-ui,sans-serif" font-size="11" fill="white" opacity="0.4">25</text>

    <!-- Grid lines -->
    <line x1="50" y1="44" x2="500" y2="44" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="50" y1="114" x2="500" y2="114" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="50" y1="184" x2="500" y2="184" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="50" y1="254" x2="500" y2="254" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Line chart: rises, then flatlines -->
    <polyline
      points="60,240 130,200 200,155 270,130 340,128 410,127 480,128"
      fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <!-- Fill under line -->
    <polygon
      points="60,240 130,200 200,155 270,130 340,128 410,127 480,128 480,270 60,270"
      fill="white" opacity="0.06"/>

    <!-- Dots on the line -->
    <circle cx="60" cy="240" r="5" fill="white" opacity="0.7"/>
    <circle cx="130" cy="200" r="5" fill="white" opacity="0.7"/>
    <circle cx="200" cy="155" r="5" fill="white" opacity="0.7"/>
    <circle cx="270" cy="130" r="5" fill="white" opacity="0.7"/>
    <circle cx="340" cy="128" r="7" fill="white" opacity="0.9"/>
    <circle cx="410" cy="127" r="7" fill="white" opacity="0.9"/>
    <circle cx="480" cy="128" r="7" fill="white" opacity="0.9"/>

    <!-- "Stoi w miejscu" marker -->
    <rect x="290" y="80" width="180" height="34" rx="8" fill="white" opacity="0.15"/>
    <text x="380" y="102" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">stoi w miejscu ↔</text>

    <!-- Dashed flatline continuation indicator -->
    <line x1="340" y1="128" x2="500" y2="128" stroke="white" stroke-width="2" stroke-dasharray="6 4" opacity="0.35"/>

    <!-- Chart label -->
    <text x="265" y="294" font-family="system-ui,sans-serif" font-size="12" fill="white" opacity="0.4" text-anchor="middle">Widoczność wizytówki Google · ostatnie 6 miesięcy</text>
  </g>

  <!-- Right — pin + question mark -->
  <g transform="translate(730, 80)">
    <!-- Pin body -->
    <path d="M160 20 C220 20 270 70 270 130 C270 190 160 290 160 290 C160 290 50 190 50 130 C50 70 100 20 160 20 Z"
      fill="white" opacity="0.15" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
    <path d="M160 20 C220 20 270 70 270 130 C270 190 160 290 160 290 C160 290 50 190 50 130 C50 70 100 20 160 20 Z"
      fill="white" opacity="0.07"/>
    <!-- Pin inner circle -->
    <circle cx="160" cy="125" r="52" fill="white" opacity="0.2"/>
    <circle cx="160" cy="125" r="38" fill="white" opacity="0.85"/>
    <!-- Question mark -->
    <text x="160" y="148" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="#FF6A00" text-anchor="middle" opacity="0.9">?</text>
  </g>

  <!-- Label strip at bottom -->
  <rect x="0" y="565" width="1200" height="65" fill="black" opacity="0.2"/>
  <text x="100" y="606" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.5" letter-spacing="5">MIAUSEO · KURS · WIZYTÓWKA GOOGLE</text>

  <!-- Price badge -->
  <rect x="940" y="30" width="220" height="64" rx="16" fill="white" opacity="0.15"/>
  <text x="1050" y="58" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" opacity="0.7">Dostęp nielimitowany</text>
  <text x="1050" y="82" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">500 zł brutto</text>
</svg>
