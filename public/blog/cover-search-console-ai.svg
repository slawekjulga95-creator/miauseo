<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0a2f8a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="220" fill="white" opacity="0.025"/>
  <circle cx="1150" cy="580" r="280" fill="white" opacity="0.025"/>

  <!-- Search Console panel mockup (left) -->
  <rect x="80" y="100" width="460" height="400" rx="18" fill="white" opacity="0.08"/>
  <rect x="80" y="100" width="460" height="52" rx="18" fill="white" opacity="0.1"/>
  <!-- Panel title bar dots -->
  <circle cx="113" cy="126" r="7" fill="white" opacity="0.3"/>
  <circle cx="136" cy="126" r="7" fill="white" opacity="0.2"/>
  <circle cx="159" cy="126" r="7" fill="white" opacity="0.15"/>
  <!-- Panel label -->
  <text x="186" y="132" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white" opacity="0.5" letter-spacing="2">SEARCH CONSOLE</text>

  <!-- Tab: Generative AI -->
  <rect x="100" y="168" width="170" height="30" rx="8" fill="white" opacity="0.15"/>
  <text x="185" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.9">Generative AI</text>
  <rect x="285" y="168" width="120" height="30" rx="8" fill="white" opacity="0.05"/>
  <text x="345" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" opacity="0.4">Discover</text>

  <!-- Chart bars -->
  <g>
    <!-- Bar labels -->
    <text x="116" y="460" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.35">Sty</text>
    <text x="160" y="460" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.35">Lut</text>
    <text x="204" y="460" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.35">Mar</text>
    <text x="248" y="460" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.35">Kwi</text>
    <text x="292" y="460" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.35">Maj</text>
    <text x="336" y="460" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.35">Cze</text>

    <!-- Bars growing trend -->
    <rect x="110" y="390" width="30" height="58" rx="5" fill="url(#bar1)" opacity="0.4"/>
    <rect x="154" y="368" width="30" height="80" rx="5" fill="url(#bar1)" opacity="0.5"/>
    <rect x="198" y="345" width="30" height="103" rx="5" fill="url(#bar1)" opacity="0.6"/>
    <rect x="242" y="318" width="30" height="130" rx="5" fill="url(#bar1)" opacity="0.7"/>
    <rect x="286" y="290" width="30" height="158" rx="5" fill="url(#bar1)" opacity="0.8"/>
    <!-- Last bar highlighted green = AI reports launched -->
    <rect x="330" y="255" width="30" height="193" rx="5" fill="url(#bar2)"/>
    <!-- New label on last bar -->
    <rect x="312" y="232" width="68" height="20" rx="6" fill="#16a34a"/>
    <text x="346" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white">NOWE</text>
  </g>

  <!-- Metric cards bottom of panel -->
  <rect x="100" y="475" width="185" height="14" rx="4" fill="white" opacity="0.12"/>
  <rect x="295" y="475" width="120" height="14" rx="4" fill="white" opacity="0.08"/>

  <!-- Right side: title text -->
  <text x="610" y="175" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.45" letter-spacing="5">CZERWIEC 2026 · GOOGLE UPDATE</text>

  <text x="610" y="245" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="white" opacity="0.97">Raporty AI</text>
  <text x="610" y="308" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="white" opacity="0.97">w Search</text>
  <text x="610" y="371" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="#4ade80">Console</text>

  <text x="610" y="420" font-family="system-ui,sans-serif" font-size="18" fill="white" opacity="0.55" font-weight="400">AI Overviews · AI Mode · Discover</text>

  <!-- Divider line -->
  <line x1="610" y1="445" x2="1120" y2="445" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Impressions pill -->
  <rect x="610" y="460" width="130" height="32" rx="16" fill="white" opacity="0.1"/>
  <text x="675" y="481" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.7">Impressions</text>

  <rect x="754" y="460" width="90" height="32" rx="16" fill="white" opacity="0.1"/>
  <text x="799" y="481" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.7">Pages</text>

  <rect x="858" y="460" width="105" height="32" rx="16" fill="white" opacity="0.1"/>
  <text x="910" y="481" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.7">Countries</text>

  <rect x="977" y="460" width="90" height="32" rx="16" fill="white" opacity="0.1"/>
  <text x="1022" y="481" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.7">Devices</text>

  <!-- Bottom label -->
  <text x="80" y="590" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.25" letter-spacing="5">MIAUSEO · SEO · GOOGLE SEARCH CONSOLE · AI OVERVIEWS</text>
</svg>
