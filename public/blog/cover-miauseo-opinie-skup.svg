<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#D45500"/>
    </linearGradient>
    <pattern id="dots" width="58" height="58" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="white" opacity="0.09"/>
    </pattern>
  </defs>

  <!-- Tło -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Znak wodny -->
  <text x="965" y="440" font-family="system-ui, sans-serif" font-size="300" font-weight="900" fill="white" opacity="0.10" text-anchor="middle">466</text>

  <!-- Plakietka -->
  <rect x="80" y="72" width="252" height="42" rx="21" fill="white" opacity="0.16"/>
  <text x="206" y="99" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="white" letter-spacing="2" text-anchor="middle">CASE STUDY · 2026</text>

  <!-- Nagłówek -->
  <text x="78" y="252" font-family="system-ui, sans-serif" font-size="94" font-weight="900" fill="white" letter-spacing="-2">466 wizyt</text>
  <text x="80" y="328" font-family="system-ui, sans-serif" font-size="58" font-weight="800" fill="#FFE3CC" letter-spacing="-1">w punkcie · 3 miesiące</text>

  <!-- Linia -->
  <rect x="82" y="360" width="360" height="3" rx="1.5" fill="white" opacity="0.35"/>

  <!-- Podtytuł -->
  <text x="80" y="405" font-family="system-ui, sans-serif" font-size="25" font-weight="500" fill="white" opacity="0.92">Skup telefonów · SEO, treści i zaplecze NAP</text>

  <!-- Stabilność -->
  <text x="80" y="478" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white" opacity="0.92">stabilne pozycje mimo konkurencji sieciówek</text>

  <!-- Stopka -->
  <circle cx="92" cy="560" r="7" fill="white"/>
  <text x="112" y="567" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="white" letter-spacing="-0.5">MiauSEO</text>
</svg>
