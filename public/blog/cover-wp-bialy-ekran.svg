<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/><line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/><line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/><line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <circle cx="120" cy="120" r="180" fill="white" opacity="0.03"/>
  <circle cx="1100" cy="520" r="220" fill="white" opacity="0.03"/>
  <!-- Monitor frame -->
  <rect x="340" y="150" width="520" height="340" rx="18" fill="white" opacity="0.12"/>
  <rect x="360" y="170" width="480" height="290" rx="8" fill="white" opacity="0.95"/>
  <!-- White screen content (blank) -->
  <rect x="370" y="180" width="460" height="270" rx="4" fill="white"/>
  <!-- Blinking cursor on white screen -->
  <rect x="390" y="210" width="3" height="22" fill="#334155" opacity="0.4"/>
  <!-- Monitor stand -->
  <rect x="570" y="490" width="60" height="30" rx="4" fill="white" opacity="0.15"/>
  <rect x="520" y="518" width="160" height="12" rx="6" fill="white" opacity="0.12"/>
  <!-- Question mark on white screen -->
  <text x="540" y="360" font-family="system-ui,sans-serif" font-size="120" font-weight="900" fill="#334155" opacity="0.08">?</text>
  <!-- WP logo hint -->
  <circle cx="600" cy="295" r="55" fill="none" stroke="#334155" stroke-width="3" opacity="0.15"/>
  <text x="574" y="318" font-family="system-ui,sans-serif" font-size="48" font-weight="900" fill="#334155" opacity="0.2">W</text>
  <text x="100" y="576" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.35" letter-spacing="6">MIAUSEO · WORDPRESS · NAPRAWA</text>
</svg>
