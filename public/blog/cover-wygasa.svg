<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle hex pattern -->
  <g opacity="0.06" stroke="white" stroke-width="1.5" fill="none">
    <polygon points="150,80 200,50 250,80 250,140 200,170 150,140"/>
    <polygon points="250,140 300,110 350,140 350,200 300,230 250,200"/>
    <polygon points="350,80 400,50 450,80 450,140 400,170 350,140"/>
    <polygon points="450,140 500,110 550,140 550,200 500,230 450,200"/>
    <polygon points="150,230 200,200 250,230 250,290 200,320 150,290"/>
    <polygon points="350,230 400,200 450,230 450,290 400,320 350,290"/>
    <polygon points="850,80 900,50 950,80 950,140 900,170 850,140"/>
    <polygon points="950,140 1000,110 1050,140 1050,200 1000,230 950,200"/>
    <polygon points="850,230 900,200 950,230 950,290 900,320 850,290"/>
  </g>
  <!-- Calendar body -->
  <rect x="250" y="150" width="340" height="320" rx="24" fill="white" opacity="0.15"/>
  <rect x="250" y="150" width="340" height="80" rx="24" fill="white" opacity="0.2"/>
  <rect x="250" y="200" width="340" height="30" fill="white" opacity="0.2"/>
  <!-- Calendar rings -->
  <rect x="320" y="130" width="24" height="50" rx="8" fill="white" opacity="0.6"/>
  <rect x="500" y="130" width="24" height="50" rx="8" fill="white" opacity="0.6"/>
  <!-- Calendar header text -->
  <text x="420" y="200" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">WYGASA?</text>
  <!-- Big X on calendar -->
  <line x1="300" y1="270" x2="540" y2="450" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.85"/>
  <line x1="540" y1="270" x2="300" y2="450" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.85"/>
  <!-- Phone with scam call on right -->
  <rect x="720" y="150" width="200" height="340" rx="32" fill="white" opacity="0.15"/>
  <rect x="740" y="170" width="160" height="260" rx="18" fill="white" opacity="0.12"/>
  <!-- Screen content: "GOOGLE" caller ID -->
  <rect x="750" y="195" width="140" height="100" rx="10" fill="white" opacity="0.15"/>
  <text x="820" y="235" font-family="system-ui,sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.6">Przychodzące</text>
  <text x="820" y="265" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">"Google"</text>
  <!-- Red circle with X over phone = reject -->
  <circle cx="770" cy="450" r="28" fill="white" opacity="0.15"/>
  <line x1="756" y1="436" x2="784" y2="464" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <line x1="784" y1="436" x2="756" y2="464" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Big NO badge -->
  <circle cx="990" cy="220" r="90" fill="white" opacity="0.15"/>
  <text x="990" y="252" font-family="system-ui,sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">NIE</text>
  <!-- Label -->
  <text x="100" y="576" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.35" letter-spacing="6">MIAUSEO · WIZYTÓWKA GOOGLE · UWAGA NA OSZUSTWO</text>
</svg>
