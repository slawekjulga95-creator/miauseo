<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#3b0764"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="60%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#center-glow)"/>

  <!-- Grid lines subtle -->
  <g stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow blob left -->
  <ellipse cx="200" cy="315" rx="300" ry="200" fill="#7c3aed" opacity="0.12" filter="url(#blur-sm)"/>
  <!-- Glow blob right -->
  <ellipse cx="950" cy="315" rx="250" ry="180" fill="#a855f7" opacity="0.1" filter="url(#blur-sm)"/>

  <!-- Butterfly shapes (abstract, composed of circles) representing "5 made of butterflies" -->
  <g opacity="0.25">
    <circle cx="820" cy="200" r="40" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <circle cx="880" cy="160" r="28" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="860" cy="250" r="22" fill="none" stroke="#a855f7" stroke-width="1"/>
    <circle cx="920" cy="210" r="18" fill="none" stroke="#c084fc" stroke-width="1"/>
    <circle cx="840" cy="130" r="14" fill="none" stroke="#ddd6fe" stroke-width="1"/>

    <circle cx="940" cy="380" r="35" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <circle cx="990" cy="340" r="24" fill="none" stroke="#c084fc" stroke-width="1"/>
    <circle cx="970" cy="430" r="18" fill="none" stroke="#a855f7" stroke-width="1"/>
    <circle cx="1020" cy="390" r="14" fill="none" stroke="#c084fc" stroke-width="1"/>

    <circle cx="760" cy="450" r="30" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="800" cy="490" r="20" fill="none" stroke="#a855f7" stroke-width="1"/>
    <circle cx="730" cy="480" r="16" fill="none" stroke="#7c3aed" stroke-width="1"/>
  </g>

  <!-- Anthropic "A" abstract mark -->
  <g transform="translate(840, 280)">
    <polygon points="0,-60 52,60 -52,60" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
    <line x1="-26" y1="20" x2="26" y2="20" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="80" width="260" height="36" rx="18" fill="#7c3aed" opacity="0.9"/>
  <text x="210" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">SZTUCZNA INTELIGENCJA</text>

  <!-- Main headline -->
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="white" letter-spacing="-1">Claude Fable 5</text>
  <text x="80" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#c084fc" letter-spacing="-1">i Mythos 5</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a5b4fc" font-weight="400">Najmocniejszy model AI dostępny publicznie</text>

  <!-- Divider -->
  <line x1="80" y1="375" x2="480" y2="375" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>

  <!-- Stats row -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b5cf6" font-weight="700" letter-spacing="1">STRIPE SKOMPRESOWAŁ MIESIĄCE PRACY DO DNI</text>

  <!-- Date + source -->
  <text x="80" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6d28d9" font-weight="500">9 czerwca 2026 — Anthropic</text>

  <!-- MiauSEO logo area -->
  <rect x="80" y="560" width="110" height="32" rx="6" fill="#7c3aed" opacity="0.3"/>
  <text x="135" y="581" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#c084fc" text-anchor="middle">MiauSEO</text>
</svg>
