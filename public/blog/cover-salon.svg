<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/><stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.07" fill="white">
    <circle cx="75" cy="75" r="4"/><circle cx="225" cy="75" r="4"/><circle cx="375" cy="75" r="4"/><circle cx="525" cy="75" r="4"/><circle cx="675" cy="75" r="4"/><circle cx="825" cy="75" r="4"/><circle cx="975" cy="75" r="4"/><circle cx="1125" cy="75" r="4"/>
    <circle cx="75" cy="225" r="4"/><circle cx="225" cy="225" r="4"/><circle cx="375" cy="225" r="4"/><circle cx="525" cy="225" r="4"/><circle cx="675" cy="225" r="4"/><circle cx="825" cy="225" r="4"/><circle cx="975" cy="225" r="4"/><circle cx="1125" cy="225" r="4"/>
    <circle cx="75" cy="375" r="4"/><circle cx="225" cy="375" r="4"/><circle cx="375" cy="375" r="4"/><circle cx="525" cy="375" r="4"/><circle cx="675" cy="375" r="4"/><circle cx="825" cy="375" r="4"/><circle cx="975" cy="375" r="4"/><circle cx="1125" cy="375" r="4"/>
    <circle cx="75" cy="525" r="4"/><circle cx="225" cy="525" r="4"/><circle cx="375" cy="525" r="4"/><circle cx="525" cy="525" r="4"/><circle cx="675" cy="525" r="4"/><circle cx="825" cy="525" r="4"/><circle cx="975" cy="525" r="4"/><circle cx="1125" cy="525" r="4"/>
  </g>
  <!-- Scissors -->
  <g transform="rotate(-20 420 310)">
    <!-- Blade 1 -->
    <ellipse cx="380" cy="200" rx="16" ry="100" fill="white" opacity="0.85"/>
    <!-- Blade 2 -->
    <ellipse cx="420" cy="200" rx="16" ry="100" fill="white" opacity="0.85"/>
    <!-- Pivot -->
    <circle cx="400" cy="300" r="22" fill="white" opacity="0.9"/>
    <circle cx="400" cy="300" r="10" fill="#9d174d" opacity="0.6"/>
    <!-- Handle 1 -->
    <ellipse cx="370" cy="390" rx="28" ry="50" fill="none" stroke="white" stroke-width="14" opacity="0.85"/>
    <!-- Handle 2 -->
    <ellipse cx="430" cy="390" rx="28" ry="50" fill="none" stroke="white" stroke-width="14" opacity="0.85"/>
  </g>
  <!-- Mirror circle -->
  <circle cx="750" cy="270" r="160" fill="white" opacity="0.15"/>
  <circle cx="750" cy="270" r="140" fill="white" opacity="0.12"/>
  <circle cx="750" cy="270" r="120" fill="white" opacity="0.85"/>
  <!-- Mirror handle -->
  <rect x="732" y="410" width="36" height="100" rx="12" fill="white" opacity="0.85"/>
  <!-- Reflection sparkles in mirror -->
  <text x="750" y="260" font-family="system-ui,sans-serif" font-size="72" fill="#9d174d" text-anchor="middle" opacity="0.15">✦</text>
  <!-- Stars/sparkles -->
  <text x="220" y="180" font-family="system-ui,sans-serif" font-size="36" fill="white" opacity="0.5">✦</text>
  <text x="160" y="360" font-family="system-ui,sans-serif" font-size="24" fill="white" opacity="0.4">✦</text>
  <text x="980" y="160" font-family="system-ui,sans-serif" font-size="28" fill="white" opacity="0.4">✦</text>
  <text x="1050" y="350" font-family="system-ui,sans-serif" font-size="20" fill="white" opacity="0.35">✦</text>
  <!-- Facebook + Instagram badge -->
  <rect x="860" y="350" width="250" height="90" rx="16" fill="white" opacity="0.18"/>
  <text x="985" y="400" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">Facebook Ads</text>
  <text x="985" y="425" font-family="system-ui,sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.7">Instagram · Reels · Stories</text>
  <text x="100" y="576" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.35" letter-spacing="6">MIAUSEO · SALON KOSMETYCZNY · FACEBOOK ADS</text>
</svg>
