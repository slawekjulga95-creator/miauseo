<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Wave lines -->
  <g opacity="0.07" stroke="white" stroke-width="2" fill="none">
    <path d="M0 80 Q300 40 600 80 T1200 80"/>
    <path d="M0 160 Q300 120 600 160 T1200 160"/>
    <path d="M0 240 Q300 200 600 240 T1200 240"/>
    <path d="M0 470 Q300 430 600 470 T1200 470"/>
    <path d="M0 550 Q300 510 600 550 T1200 550"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="150" cy="480" r="200" fill="white" opacity="0.04"/>
  <circle cx="1050" cy="150" r="200" fill="white" opacity="0.04"/>
  <!-- Camera body -->
  <rect x="320" y="190" width="440" height="310" rx="32" fill="white" opacity="0.18"/>
  <!-- Camera top bump (viewfinder hump) -->
  <rect x="440" y="155" width="120" height="50" rx="16" fill="white" opacity="0.18"/>
  <!-- Camera lens outer ring -->
  <circle cx="540" cy="345" r="105" fill="white" opacity="0.15"/>
  <circle cx="540" cy="345" r="85" fill="white" opacity="0.2"/>
  <circle cx="540" cy="345" r="62" fill="white" opacity="0.9"/>
  <circle cx="540" cy="345" r="38" fill="#0ea5e9"/>
  <circle cx="540" cy="345" r="22" fill="white" opacity="0.5"/>
  <!-- Flash -->
  <rect x="360" y="215" width="55" height="38" rx="8" fill="white" opacity="0.6"/>
  <!-- Shutter button -->
  <circle cx="680" cy="230" r="18" fill="white" opacity="0.5"/>
  <!-- Photo thumbnails grid on right -->
  <rect x="810" y="160" width="160" height="110" rx="12" fill="white" opacity="0.18"/>
  <rect x="810" y="285" width="160" height="110" rx="12" fill="white" opacity="0.28"/>
  <rect x="810" y="410" width="160" height="110" rx="12" fill="white" opacity="0.18"/>
  <!-- Small landscape icon inside thumbnails -->
  <circle cx="850" cy="197" r="15" fill="white" opacity="0.4"/>
  <polygon points="820,255 870,215 920,245 970,225 970,260 820,260" fill="white" opacity="0.3"/>
  <circle cx="850" cy="322" r="15" fill="white" opacity="0.6"/>
  <polygon points="820,380 870,345 920,365 970,350 970,385 820,385" fill="white" opacity="0.5"/>
  <circle cx="850" cy="447" r="15" fill="white" opacity="0.4"/>
  <polygon points="820,500 870,470 920,490 970,475 970,510 820,510" fill="white" opacity="0.3"/>
  <!-- Label -->
  <text x="100" y="576" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.35" letter-spacing="6">MIAUSEO · ZDJĘCIA · GOOGLE BUSINESS PROFILE</text>
</svg>
