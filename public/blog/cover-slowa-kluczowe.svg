<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- dot grid -->
  <g opacity="0.06" fill="white">
    <circle cx="75" cy="75" r="3.5"/><circle cx="225" cy="75" r="3.5"/><circle cx="375" cy="75" r="3.5"/><circle cx="525" cy="75" r="3.5"/><circle cx="675" cy="75" r="3.5"/><circle cx="825" cy="75" r="3.5"/><circle cx="975" cy="75" r="3.5"/><circle cx="1125" cy="75" r="3.5"/>
    <circle cx="75" cy="225" r="3.5"/><circle cx="225" cy="225" r="3.5"/><circle cx="375" cy="225" r="3.5"/><circle cx="525" cy="225" r="3.5"/><circle cx="675" cy="225" r="3.5"/><circle cx="825" cy="225" r="3.5"/><circle cx="975" cy="225" r="3.5"/><circle cx="1125" cy="225" r="3.5"/>
    <circle cx="75" cy="375" r="3.5"/><circle cx="225" cy="375" r="3.5"/><circle cx="375" cy="375" r="3.5"/><circle cx="525" cy="375" r="3.5"/><circle cx="675" cy="375" r="3.5"/><circle cx="825" cy="375" r="3.5"/><circle cx="975" cy="375" r="3.5"/><circle cx="1125" cy="375" r="3.5"/>
    <circle cx="75" cy="525" r="3.5"/><circle cx="225" cy="525" r="3.5"/><circle cx="375" cy="525" r="3.5"/><circle cx="525" cy="525" r="3.5"/><circle cx="675" cy="525" r="3.5"/><circle cx="825" cy="525" r="3.5"/><circle cx="975" cy="525" r="3.5"/><circle cx="1125" cy="525" r="3.5"/>
  </g>

  <!-- Search bar -->
  <rect x="80" y="95" width="620" height="64" rx="16" fill="white" opacity="0.15" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <circle cx="122" cy="127" r="14" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="132" y1="137" x2="145" y2="150" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <rect x="158" y="119" width="280" height="16" rx="5" fill="white" opacity="0.35"/>
  <rect x="158" y="119" width="180" height="16" rx="5" fill="white" opacity="0.55"/>
  <!-- cursor blink -->
  <rect x="342" y="117" width="2" height="20" rx="1" fill="white" opacity="0.8"/>

  <!-- Keyword volume chart -->
  <g transform="translate(80, 195)">
    <rect width="620" height="310" rx="16" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

    <!-- grid lines -->
    <line x1="40" y1="260" x2="600" y2="260" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="40" y1="195" x2="600" y2="195" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="40" y1="130" x2="600" y2="130" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="40" y1="65" x2="600" y2="65" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

    <!-- bars -->
    <!-- fryzjer Warszawa -->
    <rect x="60" y="80" width="54" height="180" rx="8" fill="url(#bar1)" opacity="0.9"/>
    <text x="87" y="275" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.5" text-anchor="middle">fryzjer</text>
    <text x="87" y="286" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.5" text-anchor="middle">Warszawa</text>
    <text x="87" y="72" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">6 600</text>

    <!-- fryzjer damski -->
    <rect x="140" y="120" width="54" height="140" rx="8" fill="white" opacity="0.6"/>
    <text x="167" y="275" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.5" text-anchor="middle">fryzjer</text>
    <text x="167" y="286" font-family="system-ui,sans-serif" font-size="10" fill="white" opacity="0.5" text-anchor="middle">damski</text>
    <text x="167" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">2 400</text>

    <!-- fryzjer damski Wola -->
    <rect x="220" y="190" width="54" height="70" rx="8" fill="white" opacity="0.45"/>
    <text x="247" y="275" font-family="system-ui,sans-serif" font-size="9.5" fill="white" opacity="0.5" text-anchor="middle">fryzjer</text>
    <text x="247" y="286" font-family="system-ui,sans-serif" font-size="9.5" fill="white" opacity="0.5" text-anchor="middle">damski Wola</text>
    <text x="247" y="182" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">880</text>

    <!-- fryzjer damski Wola cennik -->
    <rect x="300" y="218" width="54" height="42" rx="8" fill="white" opacity="0.35"/>
    <text x="327" y="275" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity="0.5" text-anchor="middle">fryzjer Wola</text>
    <text x="327" y="286" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity="0.5" text-anchor="middle">cennik</text>
    <text x="327" y="210" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">210</text>

    <!-- ile kosztuje -->
    <rect x="380" y="234" width="54" height="26" rx="8" fill="white" opacity="0.25"/>
    <text x="407" y="275" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity="0.5" text-anchor="middle">ile kosztuje</text>
    <text x="407" y="286" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity="0.5" text-anchor="middle">strzyżenie</text>
    <text x="407" y="226" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">90</text>

    <!-- long tail -->
    <rect x="460" y="244" width="54" height="16" rx="8" fill="white" opacity="0.2"/>
    <text x="487" y="275" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity="0.5" text-anchor="middle">fryzjer</text>
    <text x="487" y="286" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity="0.5" text-anchor="middle">Wola tanio</text>
    <text x="487" y="236" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">40</text>

    <!-- Labels -->
    <text x="310" y="30" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.5" text-anchor="middle">Miesięczna liczba wyszukań · keyword volume</text>

    <!-- conversion arrow -->
    <path d="M60 35 L560 35" stroke="white" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="60" y="28" font-family="system-ui,sans-serif" font-size="10" fill="#6ee7b7" opacity="0.8">więcej ruchu</text>
    <text x="430" y="28" font-family="system-ui,sans-serif" font-size="10" fill="#fcd34d" opacity="0.8">wyższa konwersja →</text>
  </g>

  <!-- Right side — keyword tags -->
  <g transform="translate(756, 95)">
    <!-- intent labels -->
    <rect x="0" y="0" width="370" height="44" rx="12" fill="white" opacity="0.12"/>
    <text x="16" y="27" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.8">Intencja wyszukiwania</text>

    <!-- informational -->
    <rect x="0" y="58" width="175" height="36" rx="10" fill="#6ee7b7" opacity="0.2"/>
    <rect x="0" y="58" width="4" height="36" rx="2" fill="#6ee7b7"/>
    <text x="14" y="81" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.85">Informacyjna</text>

    <!-- transactional -->
    <rect x="190" y="58" width="175" height="36" rx="10" fill="#fcd34d" opacity="0.2"/>
    <rect x="190" y="58" width="4" height="36" rx="2" fill="#fcd34d"/>
    <text x="204" y="81" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.85">Transakcyjna</text>

    <!-- navigational -->
    <rect x="0" y="108" width="175" height="36" rx="10" fill="#93c5fd" opacity="0.2"/>
    <rect x="0" y="108" width="4" height="36" rx="2" fill="#93c5fd"/>
    <text x="14" y="131" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.85">Nawigacyjna</text>

    <!-- commercial -->
    <rect x="190" y="108" width="175" height="36" rx="10" fill="#f9a8d4" opacity="0.2"/>
    <rect x="190" y="108" width="4" height="36" rx="2" fill="#f9a8d4"/>
    <text x="204" y="131" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.85">Komercyjna</text>

    <!-- KD meter -->
    <rect x="0" y="168" width="370" height="100" rx="14" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <text x="16" y="194" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.6">Keyword Difficulty</text>
    <!-- KD bar -->
    <rect x="16" y="205" width="340" height="14" rx="7" fill="white" opacity="0.1"/>
    <rect x="16" y="205" width="204" height="14" rx="7" fill="#6ee7b7" opacity="0.8"/>
    <text x="16" y="238" font-family="system-ui,sans-serif" font-size="11" fill="#6ee7b7" opacity="0.8">0 — łatwe</text>
    <text x="336" y="238" font-family="system-ui,sans-serif" font-size="11" fill="#f87171" opacity="0.8" text-anchor="end">100 — trudne</text>
    <text x="218" y="201" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" opacity="0.9">60</text>

    <!-- tools badges -->
    <rect x="0" y="286" width="370" height="152" rx="14" fill="white" opacity="0.08" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <text x="16" y="312" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.6">Narzędzia badania fraz</text>
    <text x="16" y="338" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.85">• Google Keyword Planner</text>
    <text x="16" y="360" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.85">• Google Search Console</text>
    <text x="16" y="382" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.85">• Ahrefs / Semrush / Senuto</text>
    <text x="16" y="404" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.85">• Google Autocomplete + Trendy</text>
    <text x="16" y="426" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.85">• AnswerThePublic</text>
  </g>

  <text x="100" y="578" font-family="system-ui,sans-serif" font-size="21" font-weight="700" fill="white" opacity="0.3" letter-spacing="5">MIAUSEO · SŁOWA KLUCZOWE · SEO</text>
</svg>
