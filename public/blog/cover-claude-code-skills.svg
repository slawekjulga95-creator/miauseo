<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a2e"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <radialGradient id="glow1" cx="65%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="75%" r="35%">
      <stop offset="0%" style="stop-color:#FF6A00;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FF6A00;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#0ea5e9" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Terminal window (right side) -->
  <rect x="660" y="130" width="470" height="340" rx="14" fill="#0d1f33" opacity="0.85"/>
  <rect x="660" y="130" width="470" height="42" rx="14" fill="#1a3a5c" opacity="0.9"/>
  <rect x="660" y="158" width="470" height="14" fill="#1a3a5c" opacity="0.9"/>
  <circle cx="690" cy="151" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="714" cy="151" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="738" cy="151" r="7" fill="#22c55e" opacity="0.8"/>

  <!-- Terminal text lines -->
  <text x="688" y="202" font-family="monospace" font-size="14" fill="#38bdf8">$ /run</text>
  <text x="688" y="224" font-family="monospace" font-size="13" fill="#475569">Launching skill: run</text>
  <text x="688" y="246" font-family="monospace" font-size="13" fill="#22c55e">✓ HTTP 200 — server ready</text>

  <text x="688" y="282" font-family="monospace" font-size="14" fill="#38bdf8">$ /code-review high</text>
  <text x="688" y="304" font-family="monospace" font-size="13" fill="#475569">Launching skill: code-review</text>
  <text x="688" y="326" font-family="monospace" font-size="13" fill="#fbbf24">⚠ 2 findings — medium severity</text>

  <text x="688" y="362" font-family="monospace" font-size="14" fill="#38bdf8">$ /security-review</text>
  <text x="688" y="384" font-family="monospace" font-size="13" fill="#22c55e">✓ No critical issues found</text>

  <text x="688" y="420" font-family="monospace" font-size="14" fill="#38bdf8">$ /ship-check</text>
  <text x="688" y="442" font-family="monospace" font-size="13" fill="#475569">Running custom skill...</text>

  <!-- Cursor blink -->
