  <!-- Category badge -->
  <rect x="80" y="80" width="280" height="36" rx="18" fill="#0284c7" opacity="0.9"/>
  <text x="220" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">SZTUCZNA INTELIGENCJA</text>

  <!-- Headline -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1.5">Claude Code</text>
  <text x="80" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#38bdf8" letter-spacing="-1.5">Skills</text>

  <!-- Subtitle -->
  <text x="80" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#7dd3fc" font-weight="400">Jak działają i jak napisać własny od zera</text>

  <!-- Divider -->
  <line x1="80" y1="358" x2="520" y2="358" stroke="#0284c7" stroke-width="2" opacity="0.5"/>

  <!-- Feature tags -->
  <rect x="80" y="378" width="100" height="28" rx="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="130" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#38bdf8" text-anchor="middle">/run</text>

  <rect x="192" y="378" width="130" height="28" rx="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="257" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#38bdf8" text-anchor="middle">/code-review</text>

  <rect x="334" y="378" width="130" height="28" rx="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="399" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">/ship-check</text>

  <rect x="80" y="418" width="100" height="28" rx="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="130" y="437" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#38bdf8" text-anchor="middle">/simplify</text>

  <rect x="192" y="418" width="130" height="28" rx="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="257" y="437" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f87171" text-anchor="middle">/security-review</text>

  <!-- Date + meta -->
  <text x="80" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#334155" font-weight="500">12 min czytania — 8 czerwca 2026</text>

  <!-- MiauSEO -->
  <rect x="80" y="562" width="110" height="32" rx="6" fill="#0284c7" opacity="0.25"/>
  <text x="135" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#38bdf8" text-anchor="middle">MiauSEO</text>
</svg>
