<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/><line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/><line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/><line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <circle cx="120" cy="120" r="180" fill="white" opacity="0.04"/>
  <circle cx="1100" cy="520" r="220" fill="white" opacity="0.04"/>
  <!-- Envelope -->
  <rect x="340" y="200" width="520" height="340" rx="20" fill="white" opacity="0.15"/>
  <rect x="360" y="220" width="480" height="300" rx="12" fill="white" opacity="0.9"/>
  <!-- Envelope flap -->
  <polyline points="360,220 600,390 840,220" fill="none" stroke="#059669" stroke-width="4" opacity="0.6"/>
  <!-- X mark - not sending -->
  <line x1="790" y1="130" x2="870" y2="200" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <line x1="870" y1="130" x2="790" y2="200" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <circle cx="830" cy="165" r="55" fill="none" stroke="white" stroke-width="8" opacity="0.7"/>
  <!-- Email lines inside envelope -->
  <line x1="440" y1="300" x2="760" y2="300" stroke="#059669" stroke-width="4" opacity="0.3"/>
  <line x1="440" y1="330" x2="700" y2="330" stroke="#059669" stroke-width="4" opacity="0.3"/>
  <line x1="440" y1="360" x2="720" y2="360" stroke="#059669" stroke-width="4" opacity="0.3"/>
  <!-- Question mark badge -->
  <circle cx="800" cy="420" r="45" fill="#059669"/>
  <text x="800" y="440" font-family="system-ui,sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">?</text>
  <text x="100" y="576" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.35" letter-spacing="6">MIAUSEO · WORDPRESS · KONTAKT</text>
</svg>
