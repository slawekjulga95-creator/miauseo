<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#FF6A00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FF6A00;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g stroke="#6366f1" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Vercel triangle logo (right side, large, subtle) -->
  <g transform="translate(820, 180)" opacity="0.12">
    <polygon points="180,0 360,320 0,320" fill="white"/>
  </g>

  <!-- GitHub octocat circle (abstract) -->
  <circle cx="1040" cy="460" r="80" fill="none" stroke="#6e7681" stroke-width="2" opacity="0.15"/>
  <circle cx="1040" cy="460" r="55" fill="none" stroke="#6e7681" stroke-width="1.5" opacity="0.1"/>

  <!-- Deployment flow arrows (abstract) -->
  <g stroke="#6366f1" stroke-width="2" stroke-opacity="0.3" fill="none" stroke-dasharray="6 4">
    <path d="M 660 420 Q 720 380 780 420"/>
    <path d="M 780 420 Q 840 380 900 420"/>
  </g>
  <g fill="#6366f1" opacity="0.3">
    <polygon points="898,412 906,420 898,428"/>
  </g>

  <!-- Code block decoration -->
  <rect x="680" y="250" width="400" height="180" rx="12" fill="#1e293b" opacity="0.6"/>
  <rect x="680" y="250" width="400" height="36" rx="12" fill="#334155" opacity="0.6"/>
  <circle cx="706" cy="268" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="726" cy="268" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="746" cy="268" r="6" fill="#22c55e" opacity="0.7"/>
  <!-- Code lines -->
  <rect x="700" y="305" width="120" height="8" rx="4" fill="#6366f1" opacity="0.5"/>
  <rect x="700" y="323" width="200" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="700" y="341" width="160" height="8" rx="4" fill="#475569" opacity="0.5"/>
  <rect x="700" y="359" width="90" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
  <rect x="700" y="377" width="140" height="8" rx="4" fill="#475569" opacity="0.4"/>
  <rect x="700" y="395" width="110" height="8" rx="4" fill="#6366f1" opacity="0.4"/>

  <!-- Category badge -->
  <rect x="80" y="80" width="280" height="36" rx="18" fill="#6366f1" opacity="0.9"/>
  <text x="220" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">SZTUCZNA INTELIGENCJA</text>

  <!-- Main headline -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Jak podpiąć domenę</text>
  <text x="80" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#818cf8" letter-spacing="-1">pod stronę z Claude Code</text>

  <!-- Subtitle -->
  <text x="80" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="21" fill="#94a3b8" font-weight="400">Vercel — GitHub — baza danych — krok po kroku</text>

  <!-- Divider -->
  <line x1="80" y1="360" x2="560" y2="360" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

  <!-- Tags -->
  <rect x="80" y="382" width="88" height="28" rx="6" fill="#1e293b" opacity="0.8"/>
  <text x="124" y="401" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">Vercel</text>

  <rect x="178" y="382" width="88" height="28" rx="6" fill="#1e293b" opacity="0.8"/>
  <text x="222" y="401" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">GitHub</text>

  <rect x="276" y="382" width="100" height="28" rx="6" fill="#1e293b" opacity="0.8"/>
  <text x="326" y="401" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Supabase</text>

  <rect x="386" y="382" width="72" height="28" rx="6" fill="#1e293b" opacity="0.8"/>
  <text x="422" y="401" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">DNS</text>

  <!-- Read time + date -->
  <text x="80" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" font-weight="500">14 min czytania — 9 czerwca 2026</text>

  <!-- MiauSEO -->
  <rect x="80" y="560" width="110" height="32" rx="6" fill="#6366f1" opacity="0.25"/>
  <text x="135" y="581" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#818cf8" text-anchor="middle">MiauSEO</text>
</svg>
