<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ears -->
  <polygon points="10,42 22,10 36,38" fill="#1a1f2e"/>
  <polygon points="64,38 78,10 90,42" fill="#1a1f2e"/>
  <!-- Cat face circle -->
  <circle cx="50" cy="54" r="38" fill="white" stroke="#1a1f2e" stroke-width="5"/>
  <!-- Eyes -->
  <ellipse cx="34" cy="46" rx="7" ry="8" fill="#1a1f2e"/>
  <ellipse cx="66" cy="46" rx="7" ry="8" fill="#1a1f2e"/>
  <ellipse cx="34" cy="47" rx="2.5" ry="5" fill="white"/>
  <ellipse cx="66" cy="47" rx="2.5" ry="5" fill="white"/>
  <!-- Magnifying glass circle -->
  <circle cx="50" cy="66" r="13" fill="white" stroke="#1a1f2e" stroke-width="4"/>
  <!-- Bar chart inside lens -->
  <rect x="43" y="64" width="4" height="8" fill="#FF6A00"/>
  <rect x="49" y="60" width="4" height="12" fill="#FF6A00"/>
  <rect x="55" y="62" width="4" height="10" fill="#FF6A00"/>
  <!-- Magnifying glass handle -->
  <line x1="60" y1="76" x2="70" y2="86" stroke="#1a1f2e" stroke-width="5" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="5" y1="55" x2="30" y2="58" stroke="#1a1f2e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5" y1="63" x2="30" y2="63" stroke="#1a1f2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="70" y1="58" x2="95" y2="55" stroke="#1a1f2e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="63" x2="95" y2="63" stroke="#1a1f2e" stroke-width="2.5" stroke-linecap="round"/>
</svg>
